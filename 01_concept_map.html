  <script src="assets/js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const nodes = document.querySelectorAll('.map-node');
      const detailsCard = document.getElementById('details-card');
      const searchInput = document.getElementById('node-search');

      // Click to view node details
      nodes.forEach(node => {
        node.addEventListener('click', () => {
          // Reset highlights
          nodes.forEach(n => n.querySelector('circle').style.fill = '');
          
          // Highlight selected node
          const circle = node.querySelector('circle');
          circle.style.fill = 'var(--accent-gold)';

          const title = node.getAttribute('data-title');
          const desc = node.getAttribute('data-desc');
          const link = node.getAttribute('data-link');

          detailsCard.classList.remove('empty');
          detailsCard.innerHTML = `
            <h3 style="margin-top:0; color: #2C3539;">${title}</h3>
            <p>${desc}</p>
            <div style="margin-top: 1rem;">
              <a href="${link}" class="btn" style="font-size: 0.9rem; padding: 0.5rem 1.2rem;">前往該模組教材 ➔</a>
            </div>
          `;
        });
      });

      // Filter search
      searchInput.addEventListener('input', () => {
        const query = searchInput.value.toLowerCase().trim();
        if (!query) {
          nodes.forEach(n => {
            n.style.opacity = '1';
            n.querySelector('circle').style.strokeWidth = '3';
          });
          return;
        }

        nodes.forEach(n => {
          const keywords = n.getAttribute('data-keywords').toLowerCase();
          const title = n.getAttribute('data-title').toLowerCase();
          
          if (keywords.includes(query) || title.includes(query)) {
            n.style.opacity = '1';
            n.querySelector('circle').style.strokeWidth = '5'; // Make matching thicker
          } else {
            n.style.opacity = '0.25';
            n.querySelector('circle').style.strokeWidth = '3';
          }
        });
      });
    });
  </script>
